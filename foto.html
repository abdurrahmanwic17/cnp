<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Slider</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }

        .slider {
            width: 80%;
            max-width: 800px;
            margin: 40px auto;
            overflow: hidden;
            position: relative;
            border-radius: 10px;
        }

        .slides {
            display: flex;
            width: 300%;
            animation: slide 9s infinite;
        }

        .slides img {
            width: 100%;
        }

        @keyframes slide {
            0% { transform: translateX(0%); }
            33% { transform: translateX(0%); }

            40% { transform: translateX(-100%); }
            66% { transform: translateX(-100%); }

            73% { transform: translateX(-200%); }
            100% { transform: translateX(-200%); }
        }
    </style>
</head>
<body>

    <div class="slider">
        <div class="slides">
            <img src="img/draft 1.jpg" alt="Slide 1">
            <img src="img/draft 2.jpg" alt="Slide 2">
            <img src="img/logobaru.png" alt="Slide 3">
        </div>
    </div>

</body>
</html>
